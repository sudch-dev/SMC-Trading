<!DOCTYPE html>
<html>
<head>
    <title>SMC Pro Trading Terminal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .header-stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: #1e293b; padding: 15px; border-radius: 10px; flex: 1; border: 1px solid #334155; }
        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .value { font-size: 20px; font-weight: bold; display: block; }
        
        table { width: 100%; background: #1e293b; border-radius: 10px; border-collapse: collapse; overflow: hidden; }
        th { background: #334155; padding: 12px; text-align: left; font-size: 12px; color: #cbd5e1; }
        td { padding: 12px; border-bottom: 1px solid #334155; font-size: 13px; }
        
        .pnl-pos { color: #22c55e; } .pnl-neg { color: #ef4444; }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-start { background: #22c55e; color: white; }
    </style>
</head>
<body>

    <div class="header-stats">
        <div class="stat-card">
            <span class="label">Fund Balance</span>
            <span class="value" id="funds">₹0.00</span>
        </div>
        <div class="stat-card">
            <span class="label">Live P&L</span>
            <span class="value" id="pnl">₹0.00</span>
        </div>
        <div class="stat-card">
            <span class="label">Bot Status</span>
            <span class="value" id="bot-msg">Idle</span>
        </div>
    </div>

    <div id="auth-section">
        <a href="/login" class="btn" style="background:#f59e0b; color:white; text-decoration:none; display:inline-block;">Authenticate Zerodha</a>
    </div>

    <div id="control-section" style="display:none;">
        <button onclick="fetch('/start',{method:'POST'})" class="btn btn-start">Start Strategy</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Exch. Order ID</th>
                <th>Qty</th>
                <th>Entry Price</th>
                <th>Trade Status</th>
            </tr>
        </thead>
        <tbody id="position-table"></tbody>
    </table>

    <script>
        function update() {
            fetch('/status').then(r => r.json()).then(data => {
                document.getElementById('funds').innerText = "₹" + data.status.funds;
                const pnlEl = document.getElementById('pnl');
                pnlEl.innerText = "₹" + data.status.pnl;
                pnlEl.className = "value " + (data.status.pnl >= 0 ? "pnl-pos" : "pnl-neg");
                document.getElementById('bot-msg').innerText = data.status.msg;

                if(data.authenticated) {
                    document.getElementById('auth-section').style.display = 'none';
                    document.getElementById('control-section').style.display = 'block';
                }

                const tbody = document.getElementById('position-table');
                tbody.innerHTML = '';
                for (const [s, trade] of Object.entries(data.scripts)) {
                    const isTrade = typeof trade === 'object';
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${s}</b></td>
                            <td>${isTrade ? trade.ex_id : '-'}</td>
                            <td>${isTrade ? trade.qty : '0'}</td>
                            <td>${isTrade ? '₹'+trade.price : '-'}</td>
                            <td><span style="color:${isTrade ? '#22c55e':'#94a3b8'}">${isTrade ? 'OPEN POSITION' : 'SCANNING'}</span></td>
                        </tr>
                    `;
                }
            });
        }
        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
