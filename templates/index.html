<!DOCTYPE html>
<html>
<head>
    <title>SMC Dashboard | TPMV</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 30px; width: 350px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-auth { background: #ff5722; color: white; }
        .btn-start { background: #28a745; color: white; }
        .btn-stop { background: #dc3545; color: white; }
        .status-box { background: #2a2a2a; padding: 10px; margin-top: 20px; border-radius: 4px; font-size: 14px; text-align: left; }
        .status-label { color: #888; font-size: 11px; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h3>SMC Dashboard (TPMV)</h3>
        
        <div id="login-section">
            <p style="font-size: 13px; color: #aaa;">Step 1: Authenticate</p>
            <a href="/login" class="btn btn-auth">Login to Zerodha</a>
        </div>

        <div id="control-section" style="display:none;">
            <p style="font-size: 13px; color: #28a745;">Step 2: Bot Control (09:25 AM)</p>
            <button onclick="startBot()" class="btn btn-start">Start Bot</button>
            <button onclick="stopBot()" class="btn btn-stop">Stop Bot</button>
        </div>

        <div class="status-box">
            <span class="status-label">BOT STATUS</span>
            <span id="bot-status">Checking...</span>
            <hr style="border: 0; border-top: 1px solid #444; margin: 10px 0;">
            <span class="status-label">LAST UPDATE</span>
            <span id="last-update">-</span>
        </div>
        <p style="font-size: 10px; color: #555; margin-top: 15px;">URL: https://smc-trading.onrender.com</p>
    </div>

    <script>
        function startBot() { fetch('/start', {method: 'POST'}).then(r => r.json()).then(d => alert("Bot " + d.status)); }
        function stopBot() { fetch('/stop', {method: 'POST'}).then(() => alert("Bot Stopped")); }
        
        function updateUI() {
            fetch('/status').then(r => r.json()).then(data => {
                document.getElementById('bot-status').innerText = data.status;
                document.getElementById('last-update').innerText = data.last;
                if (data.authenticated) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('control-section').style.display = 'block';
                } else {
                    document.getElementById('login-section').style.display = 'block';
                    document.getElementById('control-section').style.display = 'none';
                }
            });
        }
        setInterval(updateUI, 3000);
        updateUI();
    </script>
</body>
</html>
