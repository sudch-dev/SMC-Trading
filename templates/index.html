<!DOCTYPE html>
<html lang="en">
<head>
    <title>SMC Trading Bot | TPMV</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">SMC Trading Dashboard (TPMV)</h3>
            </div>
            <div class="card-body text-center">
                <!-- STEP 1: LOGIN -->
                <div class="mb-4">
                    <h5>Step 1: Daily Authentication</h5>
                    <p class="text-muted">Kite tokens expire daily. Log in before 09:15 AM.</p>
                    <a href="/login" class="btn btn-warning px-4">Login to Zerodha</a>
                </div>

                <!-- STEP 2: BOT CONTROL -->
                <hr>
                <div class="mb-4">
                    <h5>Step 2: Bot Control</h5>
                    <p>Trading begins automatically at <strong>09:25 AM IST</strong>.</p>
                    <button onclick="startBot()" class="btn btn-success px-5">Start Bot</button>
                    <button onclick="stopBot()" class="btn btn-danger px-5">Stop Bot</button>
                </div>

                <!-- STATUS PANEL -->
                <div class="alert alert-info mt-3" id="status-panel">
                    Status: <span id="bot-status">Checking...</span> | 
                    Last Update: <span id="last-update">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startBot() {
            fetch('/start', {method: 'POST'})
                .then(r => r.json())
                .then(d => alert(d.status === 'started' ? "Bot Started Successfully" : "Error: " + d.reason));
        }
        function stopBot() {
            fetch('/stop', {method: 'POST'}).then(() => alert("Bot Stopped"));
        }
        setInterval(() => {
            fetch('/status').then(r => r.json()).then(data => {
                document.getElementById('bot-status').innerText = data.status;
                document.getElementById('last-update').innerText = data.last;
            });
        }, 5000);
    </script>
</body>
</html>
