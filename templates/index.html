<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kite Option Terminal</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; color: #212529; }
        .navbar { background: #1a1a1a; padding: 1.2rem; }
        .card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-online { background-color: #28a745; box-shadow: 0 0 10px #28a745; }
        .status-offline { background-color: #dc3545; }
        .btn-primary { background: #3d5afe; border: none; padding: 12px; font-weight: 600; border-radius: 8px; }
        .btn-danger { background: #ff1744; border: none; font-weight: 600; }
        .form-control, .form-select { border-radius: 8px; border: 2px solid #eee; padding: 10px; }
        .form-control:focus { border-color: #3d5afe; box-shadow: none; }
        .table { vertical-align: middle; }
    </style>
</head>
<body>

<nav class="navbar mb-4 shadow-sm">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand text-white fw-bold">⚡ KITE TERMINAL</span>
        <div class="d-flex align-items-center text-white-50">
            <span class="status-dot {% if auth %}status-online{% else %}status-offline{% endif %}"></span>
            <small class="fw-bold">{% if auth %}LIVE SESSION ACTIVE{% else %}SESSION EXPIRED{% endif %}</small>
        </div>
    </div>
</nav>

<div class="container">
    {% if not auth %}
    <!-- GATEKEEPER: LOGIN REQUIRED -->
    <div class="row justify-content-center mt-5">
        <div class="col-md-5">
            <div class="card p-5 text-center">
                <div class="display-3 mb-4">🛡️</div>
                <h3 class="fw-bold">Gateway Locked</h3>
                <p class="text-muted mb-4">Please authenticate via Zerodha to access the ATM Option Terminal.</p>
                <a href="/login" class="btn btn-primary btn-lg w-100">LOG IN TO KITE</a>
            </div>
        </div>
    </div>
    {% else %}
    <!-- DASHBOARD: AUTHENTICATED -->
    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-4">
                <h5 class="fw-bold mb-4">Configuration</h5>
                
                <div class="mb-3">
                    <label class="form-label">Strategy Side</label>
                    <select id="side" class="form-select">
                        <option value="NONE" {% if config.active_side == 'NONE' %}selected{% endif %}>Select ATM Contract</option>
                        <option value="CE" {% if config.active_side == 'CE' %}selected{% endif %}>NIFTY CALL (CE)</option>
                        <option value="PE" {% if config.active_side == 'PE' %}selected{% endif %}>NIFTY PUT (PE)</option>
                    </select>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label">Target %</label>
                        <input type="number" id="tp" class="form-control" value="{{config.target_pct}}">
                    </div>
                    <div class="col-6">
                        <label class="form-label">Stoploss %</label>
                        <input type="number" id="sl" class="form-control" value="{{config.sl_pct}}">
                    </div>
                </div>

                <button onclick="updateTrade(true)" class="btn btn-primary w-100 mb-2">DEPLOY BOT</button>
                <button onclick="updateTrade(false)" class="btn btn-outline-secondary w-100">PAUSE MONITORING</button>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between mb-4">
                    <h5 class="fw-bold">Market Monitor</h5>
                    <button onclick="emergencyExit()" class="btn btn-danger btn-sm px-3">SQUARE OFF ALL</button>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead class="text-muted small">
                            <tr>
                                <th>INSTRUMENT</th>
                                <th>QTY</th>
                                <th>AVG</th>
                                <th>LTP</th>
                                <th class="text-end">P&L</th>
                            </tr>
                        </thead>
                        <tbody id="pos_body"></tbody>
                    </table>
                </div>
            </div>
            <div id="error_log" class="mt-3 text-danger small"></div>
        </div>
    </div>
    {% endif %}
</div>

<script src="https://code.jquery.com"></script>
<script>
    function updateTrade(run) {
        const payload = {
            tp: $('#tp').val(),
            sl: $('#sl').val(),
            side: $('#side').val(),
            run: run
        };
        $.ajax({
            url: '/update_trade',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(payload),
            success: () => alert(run ? "Automation Active" : "Automation Paused")
        });
    }

    function emergencyExit() {
        if(confirm("Exit all positions?")) {
            $.ajax({
                url: '/update_trade',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({tp: 20, sl: 10, side: "NONE", run: false}),
                success: () => location.reload()
            });
        }
    }

    function refresh() {
        $.get('/status', (data) => {
            let html = '';
            if (data.positions.length === 0) {
                html = '<tr><td colspan="5" class="text-center py-5 text-muted">No Live Exposure</td></tr>';
            } else {
                data.positions.forEach(p => {
                    if (p.quantity !== 0) {
                        const color = p.pnl >= 0 ? 'text-success' : 'text-danger';
                        html += `<tr><td class="fw-bold">${p.tradingsymbol}</td>
                                 <td><span class="badge bg-light text-dark">${p.quantity}</span></td>
                                 <td>₹${p.average_price.toFixed(2)}</td>
                                 <td>₹${p.last_price.toFixed(2)}</td>
                                 <td class="text-end fw-bold ${color}">₹${p.pnl.toFixed(2)}</td></tr>`;
                    }
                });
            }
            $('#pos_body').html(html);
            if(data.error) $('#error_log').text("System Error: " + data.error);
        });
    }
    {% if auth %} setInterval(refresh, 2000); {% endif %}
</script>
</body>
</html>
