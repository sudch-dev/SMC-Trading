<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading Engine</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e5e7eb;
    margin: 0;
    text-align: center;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 14px;
    margin-top: 20px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
}

.login { background: #3b82f6; color: white; }
.start { background: #22c55e; color: white; }
.refresh { background: #f59e0b; color: black; }

.status-box {
    text-align: left;
    margin-top: 15px;
    font-size: 15px;
    line-height: 1.7;
}
</style>
</head>

<body>

<div class="container">

    <h1>AI Trading Engine</h1>

    <div class="card">

        <button class="login" onclick="login()">
            🔐 Login Zerodha
        </button>

        <button class="start" onclick="startBot()">
            ▶️ Start Trading
        </button>

        <button class="refresh" onclick="getStatus()">
            🔄 Refresh Status
        </button>

        <div class="status-box" id="status">
            Loading status...
        </div>

    </div>

</div>

<script>

const base = window.location.origin;

function login() {
    window.location.href = base + "/login";
}

async function startBot() {
    const res = await fetch(base + "/start", { method: "POST" });
    const data = await res.json();
    alert(data.status);
    getStatus();
}

async function getStatus() {
    const res = await fetch(base + "/status");
    const data = await res.json();

    const s = data.status;

    document.getElementById("status").innerHTML = `
        <b>Message:</b> ${s.msg}<br>
        <b>Last Update:</b> ${s.last}<br>
        <b>P&L:</b> ₹ ${s.pnl}<br>
        <b>Funds:</b> ₹ ${s.funds}<br>
        <b>Authenticated:</b> ${data.auth_active ? "YES" : "NO"}
    `;
}

// Auto-refresh every 10 sec
setInterval(getStatus, 10000);
getStatus();

</script>

</body>
</html>
