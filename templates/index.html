<!DOCTYPE html>
<html>
<head>
<title>NSE Institutional AI Bot</title>

<style>
body{
  font-family: Arial;
  background:#0b0f1a;
  color:white;
  text-align:center;
  padding-top:40px;
}

button{
  padding:12px 25px;
  margin:10px;
  font-size:18px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.start{background:#00c853}
.stop{background:#d50000}

#status{
  margin-top:30px;
  font-size:20px;
}
</style>
</head>

<body>

<h1>🏦 Institutional AI Trading Bot</h1>

<button class="start" onclick="start()">Start</button>
<button class="stop" onclick="stop()">Stop</button>

<div id="status">Loading...</div>

<script>

function start(){
  fetch("/start")
}

function stop(){
  fetch("/stop")
}

function update(){

  fetch("/status")
  .then(r=>r.json())
  .then(d=>{

    document.getElementById("status").innerHTML =
      "Status: " + d.status +
      "<br>Last: " + d.last +
      "<br>Error: " + d.error +
      "<br>Cash: ₹" + d.portfolio.INR
  })
}

setInterval(update, 3000)
update()

</script>

</body>
</html>
