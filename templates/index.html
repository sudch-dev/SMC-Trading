<!DOCTYPE html>
<html>
<head>
    <title>ATM Option Bot</title>
    <script src="https://code.jquery.com"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 8px; width: 60px; margin-right: 10px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Kite ATM Option Bot</h1>
    
    <div class="card">
        <h3>Authentication</h3>
        {% if not auth %}<a href="/login"><button>Login to Zerodha</button></a>{% else %}<span style="color:green;">● Connected</span>{% endif %}
    </div>

    <div class="card">
        <h3>Risk Management (TP/SL %)</h3>
        Target: <input type="number" id="tp" value="20"> 
        Stoploss: <input type="number" id="sl" value="10">
        <button onclick="updateRisk()">Update Limits</button>
    </div>

    <div class="card">
        <h3>Active Positions</h3>
        <div id="positions">Loading...</div>
    </div>

    <script>
        function updateRisk() {
            $.ajax({
                url: '/update_risk', type: 'POST', contentType: 'application/json',
                data: JSON.stringify({tp: $('#tp').val(), sl: $('#sl').val()}),
                success: (data) => alert('Risk Updated: TP ' + data.tp_pct + '% | SL ' + data.sl_pct + '%')
            });
        }

        setInterval(() => {
            $.get('/dashboard_data', (data) => {
                let html = '<table><tr><th>Symbol</th><th>Qty</th><th>P&L</th></tr>';
                data.positions.forEach(p => {
                    if(p.quantity != 0) html += `<tr><td>${p.tradingsymbol}</td><td>${p.quantity}</td><td>${p.pnl}</td></tr>`;
                });
                $('#positions').html(html + '</table>');
            });
        }, 5000);
    </script>
</body>
</html>
