<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>SMC Bot Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-gray-200 p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <!-- Header & Vital Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <p class="text-xs text-zinc-500 uppercase">Engine Status</p>
                <h2 id="status-text" class="text-xl font-bold text-yellow-500">Connecting...</h2>
            </div>
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <p class="text-xs text-zinc-500 uppercase">Available Funds</p>
                <h2 id="funds" class="text-xl font-bold text-green-400">₹ 0.00</h2>
            </div>
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <p class="text-xs text-zinc-500 uppercase">Orders (Traded/Total)</p>
                <h2 id="order-ratio" class="text-xl font-bold">0 / 0</h2>
            </div>
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800 text-right">
                <button onclick="location.href='/squareoff'" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded text-sm font-bold">PANIC SQUARE OFF</button>
            </div>
        </div>

        <!-- Active Positions -->
        <div class="bg-zinc-900 rounded-xl border border-zinc-800 overflow-hidden">
            <div class="px-6 py-4 border-b border-zinc-800 font-bold">Live Positions</div>
            <table class="w-full text-sm text-left">
                <thead class="bg-zinc-800 text-zinc-400">
                    <tr>
                        <th class="p-4">Symbol</th>
                        <th class="p-4">Qty</th>
                        <th class="p-4">Avg Price</th>
                        <th class="p-4">P&L</th>
                    </tr>
                </thead>
                <tbody id="pos-body"></tbody>
            </table>
        </div>

        <!-- Error / Log Section -->
        <div id="error-box" class="hidden bg-red-900/20 border border-red-900 text-red-400 p-4 rounded-xl text-sm"></div>
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('/dashboard_data');
                const data = await res.json();
                
                if(data.error) {
                    document.getElementById('error-box').innerText = "System Error: " + data.error;
                    document.getElementById('error-box').classList.remove('hidden');
                    return;
                }

                // Update Stats
                document.getElementById('status-text').innerText = data.engine_running ? "RUNNING" : "IDLE";
                document.getElementById('status-text').className = data.engine_running ? "text-xl font-bold text-green-500" : "text-xl font-bold text-gray-500";
                document.getElementById('funds').innerText = "₹" + data.funds.toLocaleString();
                document.getElementById('order-ratio').innerText = `${data.orders_traded} / ${data.orders_sent}`;

                // Update Positions
                const posBody = document.getElementById('pos-body');
                posBody.innerHTML = data.positions.map(p => `
                    <tr class="border-b border-zinc-800">
                        <td class="p-4 font-mono">${p.tradingsymbol}</td>
                        <td class="p-4 ${p.quantity >= 0 ? 'text-green-400' : 'text-red-400'}">${p.quantity}</td>
                        <td class="p-4">₹${p.average_price}</td>
                        <td class="p-4 font-bold ${p.pnl >= 0 ? 'text-green-400' : 'text-red-400'}">₹${p.pnl.toFixed(2)}</td>
                    </tr>
                `).join('');
                
                document.getElementById('error-box').classList.add('hidden');
            } catch (e) {
                document.getElementById('status-text').innerText = "OFFLINE";
            }
        }
        setInterval(updateDashboard, 5000); // 5 second refresh
        updateDashboard();
    </script>
</body>
</html>
