<!DOCTYPE html>
<html>
<head>
    <title>SMC AI ML Trading Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .login { background: #2563eb; color: white; }
        .start { background: #16a34a; color: white; }
        .stop { background: #dc2626; color: white; }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
        }
        th, td {
            border: 1px solid #334155;
            padding: 8px;
        }
        th {
            background: #1e293b;
        }
    </style>
</head>
<body>

<h2>SMC AI ML Trading Engine</h2>

{% if not auth %}
    <a href="/login">
        <button class="login">Login to Zerodha</button>
    </a>
{% else %}
    <button onclick="start()" class="start">Start Trading</button>
    <button onclick="stop()" class="stop">Stop Trading</button>
{% endif %}

<h3>Live Positions</h3>
<table>
    <tr>
        <th>Symbol</th>
        <th>Qty</th>
        <th>Avg Price</th>
        <th>PnL</th>
    </tr>
    {% for p in positions %}
    <tr>
        <td>{{p.tradingsymbol}}</td>
        <td>{{p.quantity}}</td>
        <td>{{p.average_price}}</td>
        <td>{{p.pnl}}</td>
    </tr>
    {% endfor %}
</table>

<script>
function start(){
    fetch("/start").then(res => res.text()).then(data => alert(data));
}
function stop(){
    fetch("/stop").then(res => res.text()).then(data => alert(data));
}
</script>

</body>
</html>
