<!DOCTYPE html>
<html>
<head>
    <title>AI Trading Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 12px 20px;
            margin: 8px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
        }

        .login { background: #2196F3; color: white; }
        .start { background: #4CAF50; color: white; }
        .stop  { background: #f44336; color: white; }

        .box {
            background: #1e1e1e;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h2>AI Intraday Trading Engine</h2>

<a href="/login"><button class="login">Login to Zerodha</button></a>
<button class="start" onclick="startBot()">Start</button>
<button class="stop" onclick="stopBot()">Stop</button>

<div class="box">
    <h3>Status</h3>
    <div id="status">Loading...</div>
</div>

<div class="box">
    <h3>Intraday Positions</h3>
    <div id="positions">None</div>
</div>

<script>

function startBot() {
    fetch("/start", {method: "POST"})
}

function stopBot() {
    fetch("/stop", {method: "POST"})
}

function updateStatus() {
    fetch("/status")
        .then(r => r.json())
        .then(data => {

            document.getElementById("status").innerHTML =
                `Msg: ${data.status.msg}<br>
                 Last: ${data.status.last}<br>
                 P&L: ₹${data.status.pnl}<br>
                 Funds: ₹${data.status.funds}<br>
                 Running: ${data.running}<br>
                 Auth: ${data.auth_active}`;

            const pos = data.intraday_positions;

            document.getElementById("positions").innerHTML =
                pos.length
                ? pos.map(p =>
                    `${p.symbol} | Qty: ${p.qty} | Avg: ₹${p.avg_price} | PnL: ₹${p.pnl}`
                  ).join("<br>")
                : "No intraday positions";
        });
}

setInterval(updateStatus, 3000);
updateStatus();

</script>

</body>
</html>
